---

# Who owns the serial console logs in console_log_path
libvirt_vm_log_owner: libvirt-qemu

# The environment passed to virt_volume.sh
libvirt_vm_script_env_debian:
  VOLUME_GROUP: libvirt-qemu
  VOLUME_OWNER: libvirt-qemu

libvirt_vm_script_env: >-
  {{ libvirt_vm_script_env_debian | combine(libvirt_vm_virsh_default_env) }}

# Whether or not to use 4M OVMF vars/firmware
__libvirt_vm_ovmf_debian_4m_efivars: >-
  {{ ansible_facts.distribution_release == 'noble' or (ansible_facts.distribution == 'Debian' and ansible_facts.distribution_major_version | int >= 13) }}
# Path to template OVMF efi variable store. A copy will be created
# for each VM created.
libvirt_vm_ovmf_efi_variable_store_path: "{{ '/usr/share/AAVMF/AAVMF_VARS.fd' if libvirt_vm_arch == 'aarch64' else '/usr/share/OVMF/' ~ ('OVMF_VARS_4M.fd' if __libvirt_vm_ovmf_debian_4m_efivars else 'OVMF_VARS.fd') }}"

# Format of the template OVMF efi variable store.
libvirt_vm_ovmf_efi_variable_store_format: raw

# Path to OVMF efi firmware
libvirt_vm_ovmf_efi_firmware_path: "{{ '/usr/share/AAVMF/AAVMF_CODE.fd' if libvirt_vm_arch == 'aarch64' else '/usr/share/OVMF/' ~ ('OVMF_CODE_4M.fd' if __libvirt_vm_ovmf_debian_4m_efivars else 'OVMF_CODE.fd') }}"
